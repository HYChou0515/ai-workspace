# git-cliff configuration — generates the platform CHANGELOG from Conventional
# Commits (#441). https://git-cliff.org/docs/configuration
#
# The generated file is src/workspace_app/help_content/CHANGELOG.md — the same
# packaged markdown the web serves on /help + /help/releases and ingests into the
# Platform Help KB collection. There is no separate root CHANGELOG.
#
# Versioning is CalVer (vYYYY.MM.DD, `.N` suffix for a same-day re-release) and
# is computed by the Makefile `release` target, NOT by git-cliff's SemVer bumper
# — git-cliff only renders the section under the tag the Makefile passes via
# `--tag`. Non-conventional commits (e.g. "wip", "--") and chore/ci/test/style/
# merge are dropped by design; only feat/fix/perf/refactor/docs land. See the
# Makefile (`make changelog-preview`, `make release`) and docs/releasing.md.

[changelog]
header = """
# 更新紀錄 / Release notes

本頁記錄平台面向使用者的重要更新,格式採 [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)。
新版本區段由 [git-cliff](https://git-cliff.org/) 從 Conventional Commits 自動生成,並隨程式碼一起
進版控,所以每次部署都會是最新的。請勿手改已生成的版本區段——它們會在下次 `make release` 時重新產生。

This page records notable user-facing platform updates in the
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) format. New version
sections are generated by git-cliff from Conventional Commits and ship with the
code, so the running version is always current. Do not hand-edit generated
sections — they are regenerated on the next `make release`.

---
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
# The whole point: non-conventional commits are excluded from the changelog.
filter_unconventional = true
filter_commits = true
protect_breaking_commits = true
# Matches the CalVer tags the Makefile cuts (v2026.07.06, v2026.07.06.1, …) and
# any legacy v-prefixed tag; bounds `--unreleased` on the latest such tag.
tag_pattern = "v[0-9].*"
# Collapse "(feat #123)" / "(#123)" footers in the subject to a clean "(#123)".
commit_preprocessors = [
  { pattern = '\\((\\w+\\s)?#([0-9]+)\\)', replace = "(#${2})" },
]
# Groups double as the machine-readable section headers the backend parser reads
# (api/help_routes.py → GET /help/releases). Keep them the canonical Keep a
# Changelog English labels; the FE localises + splits default vs detailed by
# group. Default (user-facing): Added / Fixed / Performance. Detailed-only:
# Changed / Documentation.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^bump", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
  { message = "^Merge", skip = true },
]
