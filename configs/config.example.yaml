# config.example.yaml
# Copy to `config.yaml` (gitignored) and tweak. Bundled defaults already
# work for a fresh deploy: local sandbox, in-memory filestore, Qwen3
# via Ollama, 3 RCA picker entries, KB chat wired with `kb_search`.
# Uncomment + override only what you want to change.
#
# Override mechanisms (in order of preference):
#
#   1. Edit this file. Layered merge — write only the delta, the rest
#      stays at bundled defaults.
#   2. Use ${ENV_VAR} or $ENV_VAR inside any string value. Substituted
#      at load time. Use this for secrets (api_key examples below).
#      Unset env var = loud raise at deploy startup (no silent empty).
#   3. WORKSPACE_APP_CONFIG=/path/to/your.yaml redirects the lookup.
#
# Strict validation runs at startup:
#   - unknown YAML key → raise (typo defence)
#   - broken preset reference (workspace_chat / kb_chat / infer_modules / kb.retrieval_llm / kb.wiki.llm) → raise
#   - missing prompt_file target → raise
#   - unset ${ENV_VAR} → raise
#   - `agents.kb_chat` resolves WITHOUT `kb_search` in allowed_tools → raise
#     (catches "kb_chat pointed at an RCA preset without overrides" footgun)
#   - `kb.retrieval_llm` with missing `preset` → raise (use `null` to disable)

# ╔═══════════════════════════════════════════════════════════════════╗
# ║  QUICKSTART — start here, the file is long but you touch little.   ║
# ║  Task-oriented walkthrough (deploy ladders, footgun table):       ║
# ║  → docs/configuration.md                                          ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# It already runs with NO config.yaml (local sandbox + in-memory filestore +
# Qwen3 via Ollama). You only override a delta. ~90% of deploys touch just:
#
#   agents.presets.*.model  + .llm.api_key   change the LLM  (→ [MUST] agents)
#   filestore.kind: specstar + pg_dsn        persist files   (→ [MUST] filestore)
#   server.superusers                        admins          (→ [MUST] server)
#   sandbox.kind: http + http.base_url       multi-pod       (→ [SCALE] sandbox)
#   server.run_consumers: false              split workers   (→ [SCALE] message_queue)
#
# Each section below is tagged so you can triage in place:
#   [MUST]  most real deploys set this        (server, sandbox, filestore, agents)
#   [OPT]   tune only if the default bites    (runner, failover, llm, history, kb, ...)
#   [SCALE] multi-pod / isolation / workers   (sandbox multi-pod, message_queue, run_consumers)
#
# Section directory (search the tagged banner to jump):
#   [MUST]  server · sandbox · filestore · agents (presets / picker / kb_chat)
#   [SCALE] sandbox multi-pod (root / http / isolation) · message_queue · run_consumers
#   [OPT]   tools · runner · observability · failover · llm · read_file ·
#           exec · history · kb (embedder / retrieval / vlm / wiki) · health
#
# Secrets: never inline them — write ${ENV_VAR} and set it in the environment
# (unset ⇒ loud raise at boot). Full env-var catalog: docs/configuration.md §13.

# ─── server ─────────────────────────────────── [MUST] ──────────────
# server:
#   default_user: default-user
#   host: 127.0.0.1
#   port: 8000
#   root_path: ""              # external sub-path behind a stripping proxy
#   superusers: []             # #262: user ids with UNRESTRICTED collection
#                              # access (read every collection, manage any).
#                              # e.g. ["alice@example.com"]. Empty = none.
#   run_consumers: true        # #312: whether THIS process drains the job queues
#                              # in-process. true (default) = all-in-one (local
#                              # dev / single pod). Set false on the API in a
#                              # pod-split deploy so it's a pure producer and
#                              # dedicated worker pods (`python -m
#                              # workspace_app.worker <jobtype>`) consume each
#                              # JobType under their own HPA. e.g. ${RUN_CONSUMERS}
#   turn_cancel_poll_seconds: 0.5  # #349: how often an in-flight turn polls the
#                              # shared cross-pod cancel epoch. Under degraded
#                              # sticky routing (Stop / new message routed to a
#                              # peer replica) the cancel latency equals this;
#                              # the same-pod fast-path stays instant. Smaller =
#                              # snappier cancel, more store reads per active turn.

# ─── sandbox (agent execution environment) ──── [MUST] · [SCALE] ────
# sandbox:
#   kind: local                # local | http | mock  (docker deprecated #252 — use http)
#   root: null                 # null = tmpdir per sandbox. #345: set a path on a
#                              # SHARED RWX volume for a multi-pod deploy — the
#                              # local sandbox keys each item to a fixed dir
#                              # `{root}/{item_id}/root`, so any replica resolves
#                              # the same live working files (no more appear/vanish
#                              # when sticky routing breaks). Point it at the
#                              # scratch mount, NOT the durable filestore.disk_root.
#   exec_timeout: 60.0         # TOTAL wall-clock cap per command; 0 = no cap
#   log_timeout: 60.0          # IDLE cap (#70): kill if no stdout/stderr output
#                              # for this long (assumed hung); 0 = disabled.
#                              # Long jobs: set exec_timeout: 0 + a log_timeout.
#   isolate: null              # null = auto-detect userns
#   max_workspace_bytes: 0     # #345: hard cap on ONE item's scratch dir (bytes;
#                              # 0 = unlimited). The idle reaper's du-sweeper
#                              # recycles + frees any item over it, so a single
#                              # runaway workspace can't fill the shared scratch
#                              # volume the whole fleet shares.
#   # #345 per-item OS-user + cgroup isolation (ported from the HTTP sandbox host).
#   # Off by default — needs CAP_SETUID/SETGID + a writable cgroup v2 tree, which
#   # most clusters forbid; the shared-dir fix above cures the data loss without
#   # it. Each item maps to a STABLE uid (xxhash(item_id) → uid, same on every
#   # pod) so file ownership + cgroups stay consistent fleet-wide.
#   isolation:
#     enabled: false           # true ⇒ drop each exec to its per-item uid + cgroup
#     uid_base: 1000000        # uid = uid_base + xxhash(item_id) % uid_range
#     uid_range: 2000000000
#     cgroup_root: null        # null = auto-detect the pod's delegated cgroup v2 slice
#     memory_max: 512M         # per-item cgroup memory.max
#     cpu_cores: 1.0           # per-item cgroup cpu.max
#     pids_max: 512            # per-item cgroup pids.max
#   # #501/#492: the SANDBOX's durable workspace store — DISTINCT from the API's
#   # `filestore` (the specstar blob store KB/wiki + WorkspaceFile + blob GC share).
#   # Selecting an NFS workspace tree here never swaps out that specstar filestore.
#   durable:
#     kind: ""                 # "" = follow filestore.kind (default; no change)
#                              # nfs_tree = on-disk tree the host rsyncs to/from
#     nfs_root: ""             # required for nfs_tree: the ReadWriteMany NFS mount
#     migrate_from: ""         # "" | specstar (M2 dual-read + lazy backfill cut-over)
#   # kind: http — run sandboxes in a separate host pod (see sandbox_host).
#   # http:
#   #   base_url: http://sandbox-host:8000   # the host's ClusterIP Service
#   #   read_timeout: 0          # 0 = no HTTP read deadline for exec (host bounds it)
#   #   host_managed_durable: false  # #492 true ⇒ host owns durable (NFS rsync);
#   #                                # pair with sandbox.durable.kind: nfs_tree on the SAME tree
#   #   # #492 busy-host (read-timeout) retry for the idempotent file ops: each try
#   #   # gets a longer read deadline + backoff, capped, then fails loud (no rebuild
#   #   # of a live-but-busy sandbox, no cold write). Defaults are sane — tune if hot.
#   #   io_attempts: 4           # how many tries before giving up (SandboxBusy)
#   #   io_timeout_base_s: 10    # 1st-attempt read deadline; doubles each retry…
#   #   io_timeout_cap_s: 40     # …capped here
#   #   io_backoff_base_s: 1     # sleep after the 1st failure; doubles each retry…
#   #   io_backoff_cap_s: 8      # …capped here

# ─── sandbox_host ─ MOVED to a standalone service (#251) ─────────────
# ⚠️  THE APP DOES NOT READ THIS SECTION. The sandbox host is now its OWN project
# (`sandbox-host/`, own deps/image), configured ONLY by `SANDBOX_HOST_*` ENV VARS
# on the HOST pod — NOT this file. Setting e.g. `exec_timeout` / `log_timeout`
# here has NO EFFECT (#493): a long agent command is still killed at the host's
# own default (60s) until you set `SANDBOX_HOST_EXEC_TIMEOUT` on the host pod and
# rollout. The `→ env …` arrows below name the env var each field MAPS TO — set
# THAT, in `deploy/sandbox-host.example.yaml` (see also `docs/sandbox-host.md`).
# The app only needs `sandbox.kind: http` + `sandbox.http.base_url` above to
# reach the host. (This block is retained, commented, only so existing configs
# that still carry a `sandbox_host:` section keep validating.)
# sandbox_host:
#   bind: 0.0.0.0:8000         # → env SANDBOX_HOST_BIND on the host pod
#   uid_min: 100000            # → SANDBOX_HOST_UID_MIN / _UID_MAX
#   uid_max: 199999
#   memory_max: 512M           # → SANDBOX_HOST_MEMORY_MAX (per-sandbox cgroup)
#   cpu_cores: 1.0             # → SANDBOX_HOST_CPU_CORES
#   pids_max: 512              # → SANDBOX_HOST_PIDS_MAX
#   cgroup_root: null          # → SANDBOX_HOST_CGROUP_ROOT (null = auto-detect)
#   root: null                 # → SANDBOX_HOST_ROOT
#   exec_timeout: 60.0         # → SANDBOX_HOST_EXEC_TIMEOUT
#   log_timeout: 60.0          # → SANDBOX_HOST_LOG_TIMEOUT
#   tools_dir: null            # → SANDBOX_HOST_TOOLS_DIR (prebuilt tools at /.tools)
#   idle_ttl: 1800.0           # → SANDBOX_HOST_IDLE_TTL (reap orphaned; 0 = off)

# ─── tools (how RCA tool packages are provisioned) ──── [OPT] ───────
# tools:
#   mode: prebuilt             # prebuilt | uv-run
#   # prebuilt: the self-contained bundles from scripts/prebuild_tools.py
#   #   (own python + venv), dropped read-only into the sandbox.
#   # uv-run: DEBUG mode — run each package straight from its live source
#   #   via `uv run`, so editing a tool takes effect on the next call with
#   #   no rebuild and no copied python. Needs uv on the host and forces a
#   #   non-isolated sandbox (set sandbox.isolate: false / leave it null).

# ─── filestore ──────────────────────────────── [MUST] ──────────────
# filestore:
#   kind: memory               # memory | specstar
#   pg_dsn: ${SPECSTAR_PG_DSN} # secret → env
#   disk_root: ./data/specstar
#   # #208: connect timeout (seconds) injected into pg_dsn. specstar's engine
#   # sets none, so an unreachable Postgres makes the boot hang silently for
#   # minutes at the first connection (spec.apply). With this the boot fails
#   # fast with a clear "connection ... timed out" instead. 0 = wait forever
#   # (old behaviour). An explicit connect_timeout=… already in pg_dsn wins.
#   pg_connect_timeout: 10
#   # #219: single-file upload cap in bytes (0 = no cap). Uploads stream to the
#   # blob store, so RAM stays flat regardless of size — this guards disk +
#   # sandbox-wake cost, hence a generous default (~2 GB). An over-size upload
#   # is rejected mid-stream with 413. Per-workspace TOTAL quota is #245.
#   max_file_size: 2147483648
#   # #245: per-workspace TOTAL-size quota in bytes (0 = no quota). The sum of one
#   # workspace's files may not exceed this, so a single workspace can't fill the
#   # disk root the whole deploy shares. Gated at the user upload/edit endpoints
#   # (the sandbox mirror is NOT gated — agent work is never lost); an over-quota
#   # upload is rejected mid-stream with 507. Default ~20 GiB. Orphaned blobs are
#   # reclaimed by the GC sweeper (gc_* below) so the count stays honest.
#   workspace_quota: 21474836480
#   # #245: blob-GC sweeper (reclaims deleted files' orphaned blobs via specstar's
#   # ref-count GC). gc_interval_sec = how often a sweep runs (0 = off); a CAS
#   # lease means only one pod runs the full reconcile per window. gc_t1 protects
#   # freshly-written blobs from quarantine; gc_t2 is the reversible dwell in
#   # quarantine before permanent delete. Run on the main app (all blob-referencing
#   # models registered there) — not a slim pod with a partial model set.
#   gc_interval_sec: 3600
#   gc_t1: 1h
#   gc_t2: 24h

# ─── runner (RCA agent loop) ──────────────────── [OPT] ─────────────
# runner:
#   max_retries: 2
#   max_turns: 10
#   # NOTE: the wiki agents' model + step budgets moved OUT of `runner`
#   # (the old `runner.wiki_model` / `wiki_*_max_turns`) into `kb.wiki`
#   # (issue #56), so they follow the same preset-reference pattern as
#   # every other LLM. A stale `runner.wiki_*` now fails validation loud.

# ─── message queue (#58/#59/#82: durable job queues) ──── [SCALE] ───
# Two background queues — wiki maintenance (#59) AND KB indexing (#82,
# chunk+embed off the request path) — share ONE backend, selected here.
# Jobs survive restarts, dedup re-uploads, serialize per collection, and
# — crucially — span pods.
#   - simple  : jobs are specstar resources on the shared backend, so
#               every pod consumes the same queue. Multipod works with
#               ZERO extra infra (it rides the same shared backend the
#               specstar filestore already requires). The default.
#   - rabbitmq: broker-backed, for higher throughput. The knobs below are
#               all OPTIONAL — unset ones keep specstar's defaults (shown).
# message_queue:
#   kind: simple                  # simple | rabbitmq
#   # rabbitmq:
#   #   url: ${RABBITMQ_URL}       # e.g. amqp://guest:guest@host:5672/
#   #   queue_prefix: "specstar:"  # namespace queues on a shared broker
#   #   max_retries: 3             # redelivery attempts for a failed job
#   #   retry_delay_seconds: 10    # wait between redeliveries
#   #   heartbeat_seconds: 600     # AMQP heartbeat — RAISE if slow index
#   #                              # jobs run longer than this (else reaped)

# ─── observability ────────────────────────────── [OPT] ─────────────
# Two startup observability aids:
#   1. Resolved-config dump — ALWAYS ON (no knob). On boot the fully
#      resolved config is printed (provenance-annotated, secrets masked)
#      and written to `<this dir>/config.resolved.yaml` (real values,
#      chmod 0600). Diff it against this file to see what defaulted.
#   2. LLM call log — one faithful, replayable record per outbound
#      litellm call (full messages + tools + params + the assembled
#      response). Ships ENABLED; the env var `WORKSPACE_LLM_LOG=0`
#      silences it without editing config (the prod off-switch).
#      Generative calls get a full JSON record under `<dir>/<date>/`;
#      embeddings/rerank get a one-line index summary. Delete a day with
#      `rm -rf logs/llm/<date>`. The per-call file's `request` block is
#      exactly `litellm.completion(**request)` kwargs — copy-paste it, or
#      run the dropped `logs/llm/replay.py <file>`, to re-fire the call.
# observability:
#   llm_log:
#     enabled: true             # WORKSPACE_LLM_LOG=0 overrides to off
#     dir: logs/llm             # log root (relative → run's cwd)
#     keep_days: 0              # 0 = keep all (manual prune)

# ─── busy-aware LLM failover (#196 / #131) ────── [OPT] ─────────────
# When you have SEVERAL models and any can get "too busy", give a preset a
# `fallbacks:` chain (names of OTHER presets, in priority order). Every role
# that references the preset inherits it. On a busy model — a fast error OR no
# first token within `ttft_timeout_s` — the turn switches to the next model and
# parks the busy one on a `cooldown_s` so later requests skip it. The chain is
# NOT recursive (a fallback's own `fallbacks` are ignored); roles don't override
# it (open a different preset instead). These are the GLOBAL defaults; a preset
# overrides them per-model (a slow hosted model needs a longer ttft before "no
# token yet" means "busy").
#
# RESILIENCE UNDER SUSTAINED BUSY: switching once down the chain isn't enough when
# EVERY model is busy at once — that would kill the turn. So a sweep that produces
# nothing re-sweeps: `round_backoff_s` lists the wait before each re-sweep (its
# LENGTH = how many re-sweep rounds; `[]` = a single sweep, the pre-#196-followup
# behaviour). The wait is cooldown-aware — at least the listed backoff, but it
# sleeps until a parked endpoint actually un-cools rather than re-probing in vain,
# never past `total_deadline_s`. When the deadline/rounds run out the turn fails
# with a readable "models are busy, try again" message instead of hanging.
# failover:
#   ttft_timeout_s: 8           # streaming: no first token within this ⇒ switch
#   cooldown_s: 30              # how long a busy (model,endpoint) is skipped (= the
#                               #   effective re-sweep wait — it's the wake alarm)
#   idle_timeout_s: 120         # mid-stream stall ceiling ⇒ raise (NOT switch)
#   num_retries: 2              # quick SAME-endpoint retries before switching (a
#                               #   transient blip; 0 = switch immediately). Per-
#                               #   endpoint: each preset in the chain uses its own.
#   round_backoff_s: [1, 2, 4, 8, 16]   # re-sweep the whole chain up to len() times;
#                               #   wait ≥ this much before each (capped by deadline).
#                               #   [] = no re-sweep. Read from the chain HEAD preset.
#   total_deadline_s: 120       # whole-turn ceiling; hit ⇒ readable busy failure.
#                               #   Chain-level (head preset). Interactive presets
#                               #   want this short; index/batch presets want it long.
#
# Example — local Qwen, fall over to a bigger local then to Claude when busy. The
# interactive head keeps re-sweeps short (a user is waiting); a patient batch head
# would set a longer round_backoff_s / total_deadline_s instead.
# agents:
#   presets:
#     kb-default: { model: ollama_chat/qwen3:14b, fallbacks: [qwen3-32b-local, kb-claude],
#                   round_backoff_s: [1, 2, 4], total_deadline_s: 60 }
#     qwen3-32b-local: { model: ollama_chat/qwen3:32b, llm: { base_url: http://gpu-2:11434 } }
#     kb-claude: { model: claude-opus-4-7, ttft_timeout_s: 30, num_retries: 1 }  # hosted ⇒ relax ttft

# ─── chat LLM endpoint (fallback when a preset omits llm.*) ── [OPT] ─
# Per-preset `llm.base_url` / `llm.api_key` (under agents.presets.*)
# win over this. Empty = LiteLLM's provider env defaults.
# llm:
#   base_url: ""
#   api_key: ${LLM_API_KEY}
#   # #113/#146 anti-repetition sampling penalties (per-preset, under
#   # agents.presets.<name>.llm). Omit = inherit the model default. Honoured by
#   # vLLM; Ollama's Go runner SILENTLY DROPS them — the in-stream repetition
#   # guard is the real, backend-independent backstop, this is a cheap first line.
#   # Every surface here (RCA / KB / wiki) is diagnosis/structured, where some
#   # repetition is legitimate (component names, symptoms, table cells). So keep
#   # penalties gentle and add them one at a time, testing after each (#146).
#   frequency_penalty: 0.3      # OpenAI-style additive — the main lever and the
#                               # safest on reasoning models. Start with this alone.
#   # repetition_penalty: 1.1   # HF/vLLM-style (>1 divides seen-token logits).
#                               # Add ONLY if frequency_penalty leaves loops, and
#                               # cap ~1.1 — higher CAUSES loops on reasoning models.
#   # presence_penalty: 0.2     # Open-ended generation only; it pushes the model
#                               # off its own terms, so leave it unset for diagnosis.
#   # no_repeat_ngram_size is intentionally NOT wired: it hard-bans repeated
#   # n-grams (open-ended-only — it wrecks legitimate term/table repetition in
#   # diagnosis/JSON), and this tool has no open-ended surface (#146).

# ─── read_file caps (sandbox tool) ────────────── [OPT] ─────────────
# read_file:
#   max_lines: 2000
#   max_chars: 200000

# ─── exec / tool output cap (issue #44) ───────── [OPT] ─────────────
# A tool command (e.g. `grep` over a big file) whose stdout+stderr
# exceeds this is truncated head+tail with a notice, so one call can't
# flood the model's context. Smaller than read_file's cap because tool
# outputs accumulate across turns.
# exec:
#   output_max_chars: 30000

# ─── cross-turn memory (chat history replay) ──── [OPT] ─────────────
# `max_context_tokens` (issue #45): after the message-count window,
# oldest items are dropped until the estimated tokens (~chars/4) fit, so
# huge tool outputs can't overflow the context within max_messages. 0
# disables the token budget. Default sized for the bundled local qwen3
# (~32K ctx); raise it for big-context hosted models.
# history:
#   max_messages: 40
#   max_context_tokens: 24000

# ─── KB subsystem ─────────────────────────────── [OPT] ─────────────
# kb:
#   embedder:
#     model: ollama/bge-m3                  # change → re-index event
#     query_prefix: ""
#     doc_prefix: ""
#     timeout: 60.0
#     batch_size: 64
#     base_url: ""
#     api_key: ${KB_EMBED_API_KEY}
#     fallbacks: []                         # #196 same-model replica endpoints:
#                                           # extra base_urls running the SAME
#                                           # model (a different embedding model
#                                           # would corrupt the vector space). A
#                                           # busy/failed endpoint switches to the
#                                           # next. e.g. [http://embed-2:11434]
#   chunker:
#     max_tokens: 256
#     overlap: 32
#   retrieval_llm:                          # usage-entry reference for kb_search multi-query / HyDE / rerank
#     preset: kb-retrieval                  # ← bundled LLM-only preset (no prompt/tools)
#     # model: openai/gpt-4o-mini           # ← optional: override the preset's model inline
#     # llm:                                # ← optional: per-call endpoint creds
#     #   base_url: ""                      #     empty → preset.llm.* → top-level llm.* → None
#     #   api_key: ${OPENAI_API_KEY}        #     REQUIRED if model is OpenAI/hosted and neither
#     #                                     #     preset.llm.* nor top-level llm.* carry it
#     # reasoning_effort: none              # ← none|low|medium|high; thinking for kb_search's
#     #                                     #   multi-query/HyDE/rerank calls. `none` → Ollama
#     #                                     #   think=False (qwen3 stops <think>ing on every
#     #                                     #   expansion = faster); omit = model default.
#   # retrieval_llm: null                   # ← off switch: multi-query / HyDE / rerank disabled
#   retrieval:                              # retriever behaviour (separate from retrieval_llm)
#     enhancements:                         # each knob has {default, max}
#       expand: { default: 1, max: 3 }      # int — alt query phrasings; 0 = off
#       hyde:   { default: 0, max: 1 }      # int — hypothetical-doc probes; 0 = off
#       rerank: { default: true, max: true } # bool — max=false forces off
#     quality_weight: 0.10                  # #105: strength of the doc-quality prior
#                                           #   (additive, second-phase). SMALL by design
#                                           #   ("0.1 or less") so a real relevance gap wins;
#                                           #   0 disables it. Only affects collections that
#                                           #   have a quality_rubric (others rank unchanged).
#     # quality_floor: 20                   #   optional ABSOLUTE hard cutoff: drop docs scored
#                                           #   below this. null (default) = soft only, never
#                                           #   exclude (un-scored docs are never dropped).
# # Resolution: LLM tool args > caller (context) > default; clamped to max.
# # Bundled = light (`expand=1, hyde=0, rerank=on`); operators raise expand/hyde
# # when recall trumps latency. Setting max below default is fine — `min(...)`
# # clamps the default down too.
#   cluster:                                # #506: card-gen reconcile + cluster-sweeper
#                                           #   thresholds (dedup duplicate proposals + the
#                                           #   questions raised across runs). All τ are cosine
#                                           #   SIMILARITY in [0,1]; HIGHER = stricter (fewer
#                                           #   merges / suppressions). Exact-key overlap ignores
#                                           #   these. Lower them to dedup more aggressively.
#     cluster_tau: 0.9                      #   join a candidate to a cluster at >= this sim
#     suppress_tau: 0.92                    #   >= this near a card (or a wiki hit) → auto-drop
#     update_tau: 0.8                       #   >= this (but < suppress) → suggest updating that card
#     merge_tau: 0.95                       #   background sweeper folds clusters within this sim
#     sweep_interval_seconds: 900           #   how often the API sweep backfills + folds clusters
#   max_searches_per_turn: 3                # issue #195: cap kb_search calls per KB-chat
#                                           #   reply (+ the ask_knowledge_base bridge). Each
#                                           #   search runs the expand/HyDE/rerank cascade and
#                                           #   small models tend to re-search instead of
#                                           #   answering; this bounds that. The tool reports
#                                           #   the remaining budget on every result and, once
#                                           #   used up, tells the model to answer from what it
#                                           #   already has. null = no cap. (Topic Hub etc.
#                                           #   are never capped.) Also the DEFAULT used when
#                                           #   the composer sends no per-message pick (#334).
#   max_searches_ceiling: 10                 # issue #334: upper bound the FE per-message
#                                           #   kb_search-count picker may request. The user's
#                                           #   value is clamped to [0, this] (0 = don't search
#                                           #   this reply); one budget is shared across a turn's
#                                           #   ask_knowledge_base calls. Must be a positive int.
#   code_embedder:
#     model: ""                             # "" disables P3.0 code-specialised embed
#     query_prefix: ""
#     doc_prefix: ""
#     base_url: ""
#     api_key: ${KB_CODE_EMBED_API_KEY}
#   git:
#     default_token: ${GIT_DEFAULT_TOKEN}   # PAT for self-hosted gitlab
#     sync_check_interval_sec: 300          # how often the sweeper wakes to check the daily-sync time
#     daily_sync: "03:00"                   # #355: server-local time every code collection re-syncs daily
#     # daily_sync: null                    # ← off switch: daily auto-sync off (manual POST /sync only)
#   vlm_llm:                                # issue #39: VLM for image / PDF visual pages / slides
#     preset: kb-vlm                        # ← bundled LLM-only preset (qwen2.5-vl via Ollama)
#     # model: openai/gpt-4o                # ← optional inline override (hosted vision model)
#   # vlm_llm: null                         # ← off switch: image uploads store with zero chunks
#   #                                       #   until a VLM is configured + the doc is reindexed
#   # vlm_format_llm:                       # issue #115: text LLM that re-emits the VLM's output as
#   #   preset: kb-retrieval                #   clean Markdown so the chunker splits on structure
#   #                                       #   instead of truncating tables/sections. Same usage-entry
#   #                                       #   shape as the others. OMIT = reuse retrieval_llm; both
#   #                                       #   off = stage 2 skipped (raw VLM text used as-is).
#   # deck_vlm:                             # issue #284: the multimodal model the `make_deck` tool
#   #   preset: kb-vlm                      #   drives — it SEES rendered slides + WRITES the pptxgenjs
#   #                                       #   fix, so it MUST be multimodal AND strong enough to do
#   #                                       #   both (a bigger Qwen-VL, not the tiny ingest VLM, pays
#   #                                       #   off here). OMIT = reuse vlm_llm; both off = make_deck
#   #                                       #   reports it's unavailable (fail-loud, like read_image).
#   #                                       #   Needs node + pptxgenjs + libreoffice + poppler + Noto CJK
#   #                                       #   in the sandbox; on the HTTP host they're baked into
#   #                                       #   sandbox-host/Dockerfile (the host ignores SandboxSpec.image).
#   # quality_judge:                        # issue #105: LLM-as-judge that scores a doc's quality as a
#   #   preset: kb-retrieval                #   knowledge source at index time, against each collection's
#   #   # reasoning_effort: low             #   `quality_rubric`. Same usage-entry shape as the others.
#   #                                       #   OMIT = reuse retrieval_llm (scoring turns on once a
#   #                                       #   collection sets a rubric — the rubric is the opt-in); set
#   #                                       #   null to force it off even with a rubric. Both off → docs
#   #                                       #   stay un-scored (neutral), search ranking unaffected. A
#   #                                       #   judge failure leaves a doc un-scored, never un-indexed.
#   wiki:                                   # issue #56: the LLM wiki (maintainer / reader / merge)
#     llm:                                  # ← which model drives the wiki agents. SAME preset-ref
#       preset: wiki-default                #   shape as retrieval_llm / vlm_llm. The agents own
#       # model: openai/gpt-5.5             #   their prompts + tools in code — this names only the
#       # llm:                              #   model + endpoint. NOTE: the bundled local qwen3:14b
#       #   api_key: ${OPENAI_API_KEY}      #   narrates instead of calling write_file (the
#     maintainer_max_turns: 40              #   agent-wiki-* health probe flags this) — point it at
#     reader_max_turns: 24                  #   a stronger tool-calling model. Reuse an existing
#                                           #   hosted preset to avoid restating the creds.
#   # wiki:                                 # ← off switch: `wiki.llm: null` disables wiki
#   #   llm: null                           #   maintenance on ingest + the KB-chat wiki route
#                                           #   (migration from the removed `runner.wiki_*`:
#                                           #    set kb.wiki.llm to a preset; the step budgets
#                                           #    moved here from runner too).
#   parsers: []                             # issue #39: custom in-house IParser dotted paths,
#                                           #   e.g. ["my.pkg.DoclingParser"] — registered at the
#                                           #   HEAD of the registry, run ALONGSIDE bundled ones
#   parsers_disabled: []                    # bundled parser class names to skip — replacement =
#                                           #   register custom + disable bundled, e.g.
#                                           #   parsers: ["my.pkg.DoclingParser"]
#                                           #   parsers_disabled: ["PdfParser"]

# ─── agents (presets + the picker / KB-chat) ──── [MUST] ────────────
#
# Mental model:
#
#   - `presets`: a library of LLM backends. Each preset bundles a model,
#     a system prompt, an LLM endpoint (base_url + api_key), and optionally
#     a baseline allowed_tools / suggestions / sandbox image.
#   - `workspace_chat[]`: the FE RCA picker. Order matters — the FIRST
#     entry is the default that new investigations auto-attach to and
#     the FE picker highlights from the first paint. Each entry just
#     references a preset; you can override any preset field here.
#   - `kb_chat`: the KB chat surface. Same shape as a workspace_chat
#     entry. MUST resolve to `allowed_tools` containing `kb_search` —
#     the catalog refuses to start otherwise (without that tool, the
#     KB sub-agent can't search collections and silently degrades to
#     "I can't access the KB" natural-language refusals).
#
# Bundled defaults ship 8 presets and the standard wiring:
#
#   presets:
#     qwen3-local:           { model: ollama_chat/qwen3:14b,  prompt: pkg:.../rca/prompts/system.md }
#     claude-opus:           { model: claude-opus-4-7,        prompt: pkg:.../rca/prompts/system.md }
#     openai-mini:           { model: openai/gpt-4o-mini,     prompt: pkg:.../rca/prompts/system.md }
#     kb-default:            { model: ollama_chat/qwen3:14b,  prompt: pkg:.../kb/prompts/system.md,
#                              allowed_tools: [kb_search, lookup_glossary] }
#     kb-claude:             { model: claude-opus-4-7,        prompt: pkg:.../kb/prompts/system.md,
#                              allowed_tools: [kb_search, lookup_glossary] }
#     kb-openai:             { model: openai/gpt-4o-mini,     prompt: pkg:.../kb/prompts/system.md,
#                              allowed_tools: [kb_search, lookup_glossary] }
#     infer-modules-default: { model: ollama_chat/qwen3:14b,  prompt: pkg:.../kb/prompts/infer_modules.md,
#                              allowed_tools: [kb_search] }
#     kb-retrieval:          { model: ollama_chat/qwen3:14b }   # LLM-only — no prompt/tools
#     kb-vlm:                { model: ollama_chat/qwen2.5vl:7b } # LLM-only — vision (issue #39)
#     wiki-default:          { model: ollama_chat/qwen3:14b }   # LLM-only — wiki agents (issue #56)
#   workspace_chat:
#     - { preset: qwen3-local, name: "RCA · Qwen3 (local)" }   # default
#     - { preset: claude-opus, name: "RCA · Claude Opus"  }
#     - { preset: openai-mini, name: "RCA · GPT-4o-mini"  }
#   kb_chat:
#     - { preset: kb-default, name: "KB · Qwen3 (local)" }     # default
#     - { preset: kb-claude,  name: "KB · Claude Opus"  }
#     - { preset: kb-openai,  name: "KB · GPT-4o-mini"  }
#   infer_modules:                                              # issue #66
#     # The infer_modules tool classifies EVERY process step (one KB-backed
#     # sub-agent call per UNIQUE step, run in parallel — ~1500 steps seen).
#     # Beyond the model preset, the first entry carries the per-step config:
#     - preset: infer-modules-default
#       reasoning_effort: medium        # low | medium | high (sub-agent effort)
#       parallelism: 16                 # how many steps classify concurrently
#       collection: fab-process-docs    # KB collection NAME to search for
#                                       # module naming. Omit → search ALL
#                                       # collections. Resolved once per turn;
#                                       # a name that matches nothing errors
#                                       # loudly (typo guard).
#       # KB query depth, CLAMPED by kb.retrieval.enhancements max. DEFAULT IS
#       # OFF (expand/hyde/rerank 0/false): classifying one step name is a
#       # focused lookup, and multi-query/rerank × ~1500 steps explodes into
#       # thousands of extra retrieval-LLM calls. Only raise if you really need
#       # it. NOTE: real concurrency also needs the LLM endpoint to allow it
#       # (e.g. Ollama: OLLAMA_NUM_PARALLEL>1), else requests serialize there.
#       enhancements: { expand: 0, hyde: 0, rerank: false }
#   kb.retrieval_llm: { preset: kb-retrieval }
#
# `allowed_tools` is TRI-STATE:
#   - omitted (None)  → runner exposes the default workspace toolset
#                       (exec, read_file, ..., ask_knowledge_base, ...,
#                       plus every provisioned package command). Bundled
#                       RCA presets use this so picking one gives the
#                       standard agent.
#   - `[]` empty list → runner exposes NO tools (explicit lockdown).
#   - `[a, b, c]`     → exactly those.
#
# Resolve cascade on every turn:
#   backend = catalog.get(attached_name) OR catalog.default()
#   template_raw = load_template_config(investigation.template_profile)
#   final.model / prompt / llm = backend's
#   final.allowed_tools / suggestions = template's if specified, else backend's
# So the picker (which LLM) and the template's `_config.json` (which
# tools) compose orthogonally — pick GPT for a local-lab investigation
# and you still get rca-tools/ask_knowledge_base/etc.

# ─── Example 1: keep bundled Qwen + Claude + GPT picker, just add a tuned preset ─
#
# agents:
#   presets:
#     local-tuned:
#       model: ollama_chat/qwen3:14b
#       prompt_file: prompts/local-tuned.md   # relative → THIS file's dir
#       suggestions: [draft the report, run a 5-Why]
#   workspace_chat:
#     - { preset: qwen3-local, name: "RCA · Qwen3 (local)" }   # still default
#     - { preset: local-tuned, name: "RCA · Local tuned" }
#     - { preset: claude-opus, name: "RCA · Claude Opus" }
#     - { preset: openai-mini, name: "RCA · GPT-4o-mini" }

# ─── Example 2: deploy where EVERYTHING runs on OpenAI ────────────────
#
# Override JUST the model + endpoint on the bundled presets (prompts,
# kb_search, suggestions all inherit). KB chat then auto-uses kb-default
# (with OpenAI), so no `kb_chat:` block needed.
#
# agents:
#   presets:
#     qwen3-local:                         # repurpose as "OpenAI default"
#       model: openai/gpt-4o-mini
#       llm: { api_key: ${OPENAI_API_KEY} }
#     kb-default:                          # KB stays kb-default, just on OpenAI
#       model: openai/gpt-4o-mini
#       llm: { api_key: ${OPENAI_API_KEY} }
#   workspace_chat:
#     - { preset: qwen3-local, name: "RCA · GPT-4o-mini" }     # default

# ─── Example 3: kb_chat behind a non-default preset (must add kb_search) ──
#
# `kb_chat` is a LIST (issue #32) — each entry shows up in the FE
# picker, first is the default. If you point an entry at a preset that
# ISN'T `kb-default`, you must add `allowed_tools: [kb_search]`
# somewhere along the merge chain (on the preset OR as a usage-level
# override) — otherwise catalog startup raises with the path-to-fix.
#
# agents:
#   presets:
#     hosted-claude:
#       model: claude-opus-4-7
#       prompt_file: pkg:workspace_app.kb.prompts/system.md
#       llm: { api_key: ${ANTHROPIC_API_KEY} }
#       allowed_tools: [kb_search, lookup_glossary]  # ← kb_search required; add
#                                                    #   lookup_glossary so an
#                                                    #   unknown term resolves from
#                                                    #   the glossary before search
#   kb_chat:
#     - { preset: hosted-claude, name: "KB · Claude" }     # default
#     - { preset: kb-default,    name: "KB · Qwen (local)" }

# ─── Example 4: KB chat model picker (issue #32) ────────────────────
#
# Multiple `kb_chat[]` entries → the FE composer shows a model
# dropdown. Each entry is the same usage-dict shape as workspace_chat
# (preset reference + any override). The legacy single-dict form
# (`kb_chat: { preset: x }`) is still accepted at load — wrapped into
# a single-entry list — so existing operator configs keep working.
#
# agents:
#   kb_chat:
#     - { preset: kb-default,    name: "KB · Qwen (local)" }   # default
#     - { preset: hosted-claude, name: "KB · Claude" }

# ─── Diagnostics: AI judge for the sanity matrix (#231) ──── [OPT] ──
#
# `health.judge_llm` wires an LLM-as-judge that scores every sanity-matrix
# cell pass/fail (the AI verdict + note columns) and writes a per-model
# fitness verdict. Same usage-entry shape + preset cascade as
# `kb.retrieval_llm`; a preset whose `fallbacks` are set becomes a busy-aware
# FallbackLlm (#196). Omit / `null` ⇒ AI scoring off (the AI columns stay
# empty). Point it at a CAPABLE model DISTINCT from the models under test —
# never let a model grade itself.
#
# health:
#   judge_llm:
#     preset: kb-retrieval                  # ← any bundled LLM-only preset
#     # model: openai/gpt-4o-mini           # ← optional inline model override
#     # reasoning_effort: low               # ← none|low|medium|high
#   # judge_llm: null                       # ← off (default): no AI scoring

# ─── prompt_file value forms ────────────────────────────────────────
#   pkg:<dotted-package>/<file.md>   bundled (ships with the wheel)
#   /absolute/path.md                absolute filesystem path
#   relative/path.md                 relative to THIS file's directory
