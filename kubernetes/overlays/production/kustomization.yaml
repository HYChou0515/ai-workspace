apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rca-prod
nameSuffix: -prod

resources:
  - ../../base

# Pin the image. For the sub-path deploy below, this image must be BUILT with
#   --build-arg BASE_PATH=/my-svc/rca/    (see kubernetes/README.md)
images:
  - name: rca-app
    newTag: "1.0.0"

patches:
  - path: patch-deployment.yaml
  - path: patch-configmap.yaml
  - path: patch-ingress.yaml
