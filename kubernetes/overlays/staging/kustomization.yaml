apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rca-staging
nameSuffix: -staging

resources:
  - ../../base

# Built with --build-arg BASE_PATH=/my-svc/rca/ (same sub-path as prod).
images:
  - name: rca-app
    newTag: "staging"

patches:
  - path: patch-deployment.yaml
  - path: patch-configmap.yaml
  - path: patch-ingress.yaml
