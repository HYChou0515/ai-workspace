apiVersion: v1
kind: ConfigMap
metadata:
  name: rca-config
data:
  # Server (see src/workspace_app/factories.py: Settings).
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  # External sub-path when the ingress strips a prefix (e.g. "/my-svc/rca").
  # Only affects generated URLs (OpenAPI/docs). Overlays set this; "" = root.
  APP_ROOT_PATH: ""
  DEFAULT_USER: "default-user"
  # #312: pod-split deploy — the API is a pure PRODUCER (it enqueues but does
  # not drain the job queues); dedicated worker Deployments (workers.yaml)
  # consume each JobType under their own HPA. Map this in your config.yaml as
  #   server: { run_consumers: ${RUN_CONSUMERS} }
  # (the env-interpolation convention every setting here uses). Set "true" for a
  # single all-in-one Deployment with no separate workers.
  RUN_CONSUMERS: "false"

  # Sandbox: in-pod subprocess. #345 — the working files live on the SHARED
  # SCRATCH volume (rca-scratch, mounted at /scratch), one fixed dir per item
  # (`{SANDBOX_ROOT}/{item_id}/root`) so any replica resolves the same live dir.
  # Kept off /data (the durable archive) so the two scale/back-up independently.
  SANDBOX_KIND: "local"
  SANDBOX_ROOT: "/scratch/sandbox"
  # The userns chroot jail (sandbox.isolate). Pods usually lack unprivileged
  # userns, so leave it off — distinct from the #345 uid+cgroup isolation below.
  SANDBOX_ISOLATE: "false"
  # #345 per-item OS-user + cgroup isolation (sandbox.isolation.enabled). Off by
  # default — most clusters forbid the CAP_SETUID drop + cgroup write, and the
  # shared-dir fix already cures the data loss without it. To enable, set "true"
  # AND grant the pod the capabilities + cgroup mount documented in
  # deployment.yaml. Map in config.yaml as
  #   sandbox: { isolation: { enabled: ${SANDBOX_ISOLATION_ENABLED} } }
  SANDBOX_ISOLATION_ENABLED: "false"
  # #345: hard cap on one item's scratch usage (bytes; 0 = unlimited). The idle
  # reaper's du-sweeper recycles + frees any item that blows past it, so a single
  # runaway workspace can't fill the shared scratch volume. Map in config.yaml as
  #   sandbox: { max_workspace_bytes: ${SANDBOX_MAX_WORKSPACE_BYTES} }
  SANDBOX_MAX_WORKSPACE_BYTES: "0"

  # File store. "memory" = volatile (resets on restart). For durable
  # investigations/conversations/KB data, see the README note on persistence.
  FILESTORE_KIND: "memory"

  # KB: point LiteLLM at the Ollama service. The embedder model MUST match the
  # dim the image was built with, and a real embedder requires the model pulled
  # in Ollama (see README). "" KB_LLM_MODEL disables multi-query/HyDE/rerank.
  OLLAMA_API_BASE: "http://ollama:11434"
  KB_EMBED_MODEL: "ollama/bge-m3"
  KB_EMBED_DIM: "1024"
  KB_LLM_MODEL: "ollama_chat/qwen3:14b"
