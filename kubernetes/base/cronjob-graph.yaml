# #534: weekend metric extraction. Enqueues ONE dispatch GraphJob via the API's
# specstar auto route; the GraphCoordinator fans it out (dispatch → split →
# batch) over the OPTED-IN collections (Collection.use_graph) and the graph
# worker (workers.yaml: rca-worker-graph) drains it, extracting metric claims
# into GraphClaim. Read them at GET /api/graph-claim?qb=norm_metric==<metric>.
#
# Runs weekly on Saturday (the "idle-GPU weekend"): extraction re-does every
# opted-in doc (idempotent wipe+rewrite), which is expensive VLM/LLM work — a
# nightly full re-extract would be wasteful. Requirements: a KB LLM wired, and
# the graph worker (or an all-in-one API with RUN_CONSUMERS=true) consuming the
# `graph` JobType.
#
# Tune: `schedule` (cron, in `timeZone` Asia/Taipei — e.g. "0 3 * * *" for
# nightly; needs Kubernetes ≥1.27 for the GA timeZone field). Auth: this POSTs
# unauthenticated to the in-cluster ClusterIP service; add an auth header to the
# curl if the deploy gates the create route.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rca-graph-weekly
spec:
  schedule: "0 3 * * 6" # 03:00 Asia/Taipei Saturday — the actually-idle weekend
  # small hours. (Hand-shifting to UTC would also move the DAY: Sat 03:00 Taipei
  # is Fri 19:00 UTC — the timeZone field spares every future editor that math.)
  timeZone: "Asia/Taipei"
  concurrencyPolicy: Forbid # never overlap two extraction passes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: enqueue
              image: curlimages/curl:8.11.1
              command: ["sh", "-c"]
              args:
                - >
                  curl -fsS -X POST http://rca-app/api/graph-job
                  -H 'Content-Type: application/json'
                  -d '{"payload":{"kind":"dispatch"}}'
