apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-app
spec:
  # Single replica: the app holds per-pod state (in-pod sandbox + the data on a
  # ReadWriteOnce PVC), so it does not horizontally scale as-is. Use Recreate so
  # the new pod can take the RWO volume before the old one releases it.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rca-app
  template:
    metadata:
      labels:
        app: rca-app
    spec:
      containers:
        - name: rca-app
          image: rca-app:latest # overlays pin a tag via `images:`
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: rca-config
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /openapi.json
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /openapi.json
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rca-data
