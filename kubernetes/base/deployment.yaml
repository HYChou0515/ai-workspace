# #312: the API Deployment. With RUN_CONSUMERS="false" (configmap) it runs as a
# pure PRODUCER — it serves HTTP + enqueues jobs but does NOT drain the queues.
# The job consumers run in dedicated worker Deployments (workers.yaml), each
# scaling under its own HPA, so the API can stay small while a heavy embed
# backlog scales the index workers independently. A pod-split deploy needs a
# SHARED backend (Postgres + a shared/RabbitMQ queue), not the in-memory default.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-app
spec:
  # Multi-replica (#16): the specstar data is shared on an RWX PVC. #345 makes
  # the per-item WORKING dir shared too (one fixed dir per item on rca-scratch,
  # resolvable on any pod), so workspace files stay consistent regardless of
  # which replica serves a read — per-investigation sticky routing at the Ingress
  # is now a warm-cache latency optimisation, not a correctness requirement. Only
  # the in-pod kernel + in-flight turn remain pod-local (#349 tracks cross-pod
  # turn cancel). Scale this for more users.
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: rca-app
  template:
    metadata:
      labels:
        app: rca-app
    spec:
      containers:
        - name: rca-app
          image: rca-app:latest # overlays pin a tag via `images:`
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: rca-config
          volumeMounts:
            - name: data
              mountPath: /data
            # #345: the shared scratch working volume (SANDBOX_ROOT). Separate
            # PVC from /data so the durable archive and the churny per-item dirs
            # can use different storage tiers and a runaway item can't fill the
            # archive. RWX so every replica reads/writes the same live dir.
            - name: scratch
              mountPath: /scratch
          # #345 isolation (per-item OS-user + cgroup). The base runs WITHOUT it
          # (SANDBOX_ISOLATE="false"): most clusters forbid CAP_SETUID and the
          # cgroup write, and the shared-dir fix already cures the data loss on
          # its own. To opt in, set SANDBOX_ISOLATE="true" (configmap) AND grant
          # the pod the privileges the setuid-drop + cgroup writes need:
          # securityContext:
          #   capabilities:
          #     add: ["SETUID", "SETGID", "SETPCAP", "KILL"]
          # plus a writable cgroup v2 mount at sandbox.isolation.cgroup_root
          # (a delegated sub-tree of the pod's own slice).
          readinessProbe:
            httpGet:
              path: /openapi.json
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /openapi.json
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rca-data
        - name: scratch
          persistentVolumeClaim:
            claimName: rca-scratch
