# #312: the API Deployment. With RUN_CONSUMERS="false" (configmap) it runs as a
# pure PRODUCER — it serves HTTP + enqueues jobs but does NOT drain the queues.
# The job consumers run in dedicated worker Deployments (workers.yaml), each
# scaling under its own HPA, so the API can stay small while a heavy embed
# backlog scales the index workers independently. A pod-split deploy needs a
# SHARED backend (Postgres + a shared/RabbitMQ queue), not the in-memory default.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-app
spec:
  # Multi-replica (#16): the specstar data is shared on an RWX PVC, and the
  # in-pod runtime (sandbox / kernel / in-flight turn) is kept consistent by
  # per-investigation sticky routing at the Ingress. Scale this for more users.
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: rca-app
  template:
    metadata:
      labels:
        app: rca-app
    spec:
      containers:
        - name: rca-app
          image: rca-app:latest # overlays pin a tag via `images:`
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: rca-config
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /openapi.json
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /openapi.json
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rca-data
