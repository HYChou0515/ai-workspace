<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App Launcher · 3 directions</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<meta name="theme-color" content="#16181D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F1ECE0; font-family: 'Inter', system-ui, sans-serif; color: #16181D; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="rca/system.jsx"></script>
<script type="text/babel" src="rca/launcher.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas
      title="App Launcher · 3 directions"
      subtitle="Exploration archive. B (Platform header) was chosen → see App Launcher.html for the built prototype. Chrome stays neutral; each card expresses its app color locally.">

      <DCSection id="dir-a" title="A · Quiet gallery" subtitle="No platform chrome. Centered, editorial. Color lives only in the tinted icon tile + on hover.">
        <DCArtboard id="quiet" label="Launcher · quiet gallery" width={1080} height={720}>
          <LauncherQuiet width={1080} height={720} />
        </DCArtboard>
      </DCSection>

      <DCSection id="dir-b" title="B · Platform header  ✓ chosen" subtitle="Full neutral top bar + a top accent bar per card over a neutral icon tile. Reads most like a multi-app product home.">
        <DCArtboard id="header" label="Launcher · platform header" width={1280} height={760}>
          <LauncherHeader width={1280} height={760} />
        </DCArtboard>
      </DCSection>

      <DCSection id="dir-c" title="C · Bold tiles" subtitle="Compact centered lockup. Solid app-color icon tiles + a mono color chip in the footer. Boldest color expression.">
        <DCArtboard id="bold" label="Launcher · bold tiles" width={1080} height={720}>
          <LauncherBold width={1080} height={720} />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
