# Codecov configuration for the coverage badges.
#
# Two flags give backend (Python) and frontend (TS) independent badges/columns.
# Coverage status is INFORMATIONAL only: the authoritative gate is the in-CI
# `coverage report --fail-under=100`, so a Codecov outage never blocks a merge.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flags:
  backend:
    paths:
      - src/workspace_app
    carryforward: true
  frontend:
    paths:
      - web/src
    carryforward: true

comment:
  layout: "header, flags, diff, files"
  require_changes: false
