name: Release

# Publishes a GitHub Release when a CalVer tag is pushed (#441). The release
# body is the changelog section for that version, generated by git-cliff from
# the same cliff.toml the local `make release` uses — so GitHub + the web
# (/help/releases) show identical notes.
#
# Trigger only on CalVer-shaped tags (v2026.07.06, v2026.07.06.1, …). `v20*`
# matches those and NOT a stray SemVer/baseline tag. Cutting + pushing the tag
# stays a human step (`make release` then `git push origin HEAD --follow-tags`);
# this workflow only turns the pushed tag into a published Release.
on:
  push:
    tags:
      - "v20*"

# Needed to create the Release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Full history + tags: git-cliff needs them to build the version section.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # --latest = the section for the just-pushed tag; --strip header drops the
      # bilingual page header so the Release body is just that version's notes.
      # cliff.toml is auto-loaded from the repo root. The spec pins git-cliff to
      # v2 so a future major can't silently change the template.
      - name: Generate release notes
        run: uvx --from 'git-cliff>=2,<3' git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          # The tag is the release name; mark it the latest, not a prerelease.
          make_latest: true
