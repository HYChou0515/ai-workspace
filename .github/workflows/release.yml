name: Release

# Publishes a GitHub Release when a CalVer tag is pushed (#441). The release body
# is the newest version section of the packaged CHANGELOG.md — the same file the
# web (/help/releases) serves — so GitHub + the web show identical notes. The
# changelog is generated in house at release time by `make release`
# (`python -m workspace_app.changelog`); this workflow just slices the top
# section out of the committed file, so it needs no toolchain.
#
# Trigger only on CalVer-shaped tags (v2026.07.06, v2026.07.06.1, …). `v20*`
# matches those and NOT a stray SemVer/baseline tag. Cutting + pushing the tag
# stays a human step (`make release` then `git push origin HEAD --follow-tags`);
# this workflow only turns the pushed tag into a published Release.
on:
  push:
    tags:
      - "v20*"

# Needed to create the Release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The newest section = from the first "## [" line up to (not including) the
      # next one. That drops the bilingual page header and every older release,
      # leaving just this version's notes for the Release body.
      - name: Extract release notes
        run: |
          awk '/^## \[/{n++} n==1' \
            src/workspace_app/help_content/CHANGELOG.md > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          # The tag is the release name; mark it the latest, not a prerelease.
          make_latest: true
