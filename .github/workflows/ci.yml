name: CI

# Full test gate for GitHub (the .gitlab-ci.yml is a dead placeholder).
# Mirrors the backend + frontend `test` checks; build/deploy are GitLab/k8s
# specific and intentionally NOT ported. Coverage is uploaded to Codecov under
# per-language flags so the README badges read independently.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # libmagic is needed by the tabular/magic-sniff parser path.
      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmagic1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # --all-extras pulls the process-sandbox extra (pandera/scipy/sklearn/seaborn);
      # a bare sync leaves test_infer_modules failing.
      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check

      # The authoritative coverage gate lives here (fail-loud, no external
      # dependency). Codecov is informational only.
      - name: Tests + coverage (100% gate)
        run: |
          uv run coverage run -m pytest
          uv run coverage report --fail-under=100
          uv run coverage xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          # Codecov must never block the build: the real gate is --fail-under above.
          fail_ci_if_error: false

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Tests + coverage
        run: pnpm exec vitest run --coverage

      - name: Build
        run: pnpm run build

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # `uses:` actions run at repo root regardless of job working-directory.
          files: web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
