name: CI

# Full test gate for GitHub (the .gitlab-ci.yml is a dead placeholder).
# Mirrors the backend + frontend `test` checks; build/deploy are GitLab/k8s
# specific and intentionally NOT ported. Coverage is uploaded to Codecov under
# per-language flags so the README badges read independently.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Lint / format / type — split out of the test matrix so it runs ONCE, not
  # once per shard. It's fast (seconds), so it never gates wall-clock time.
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # libmagic is needed by the tabular/magic-sniff parser path.
      - name: Install libmagic
        run: |
          # GitHub runners preload third-party apt repos (azure-cli / ms-prod)
          # whose mirrors intermittently serve an invalid InRelease and fail the
          # whole `apt-get update` with exit 100 (unrelated to us). Drop them
          # (libmagic1 is in the base Ubuntu repos) and retry update once, so a
          # flaky third-party mirror can't kill the whole CI run.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true
          sudo apt-get update || sudo apt-get update
          sudo apt-get install -y --no-install-recommends libmagic1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # --all-extras pulls the process-sandbox extra (pandera/scipy/sklearn/seaborn);
      # a bare sync leaves test_infer_modules failing.
      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format
        run: uv run ruff format --check

      # ty is run unscoped (CI checks tests/ too — a file-scoped run once missed a
      # test-helper type error).
      - name: Type check
        run: uv run ty check

  # The unit suite is SHARDED across parallel runners. On one runner the backend
  # pytest step was ~75 min (it dwarfs frontend ~4 min / sandbox-host ~1 min), so
  # the whole CI wall clock was that one step. Each shard runs a slice.
  #
  # Two shard flavours:
  #   * `paths`     — an explicit set of dirs/args handed to pytest.
  #   * `split_dir` — a single heavy dir whose SORTED test files are round-robined
  #     across `split_total` runners (this file's slice = position % total). tests/api
  #     is the outlier (~700 app-building tests, ~30 min alone even sharded off), so it
  #     is split across 3 runners here.
  # The `rest` shard runs EVERYTHING the named shards don't cover — via --ignore,
  # NOT an allowlist — so a newly added test dir is never silently dropped from CI;
  # likewise split_dir slices by `position % total`, so a new file in a split dir is
  # auto-distributed, never dropped. Coverage is uploaded per shard under the same
  # `backend` flag; Codecov merges the shards' partial reports for the badge.
  backend-test:
    name: backend-test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-1
            split_dir: tests/api
            split_index: "0"
            split_total: "3"
          - name: api-2
            split_dir: tests/api
            split_index: "1"
            split_total: "3"
          - name: api-3
            split_dir: tests/api
            split_index: "2"
            split_total: "3"
          - name: kb
            paths: tests/kb
          - name: workflow-agent-apps
            paths: tests/workflow tests/agent tests/apps
          - name: rest
            paths: >-
              --ignore=tests/api --ignore=tests/kb --ignore=tests/workflow
              --ignore=tests/agent --ignore=tests/apps tests
    steps:
      - uses: actions/checkout@v4

      # libmagic is needed by the tabular/magic-sniff parser path.
      - name: Install libmagic
        run: |
          # GitHub runners preload third-party apt repos (azure-cli / ms-prod)
          # whose mirrors intermittently serve an invalid InRelease and fail the
          # whole `apt-get update` with exit 100 (unrelated to us). Drop them
          # (libmagic1 is in the base Ubuntu repos) and retry update once, so a
          # flaky third-party mirror can't kill the whole CI run.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true
          sudo apt-get update || sudo apt-get update
          sudo apt-get install -y --no-install-recommends libmagic1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # --all-extras pulls the process-sandbox extra (pandera/scipy/sklearn/seaborn);
      # a bare sync leaves test_infer_modules failing.
      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      # CI runs UNIT tests only (`-m "not integration"`), parallelised with xdist.
      # Integration tests (real docker / subprocess sandbox / jupyter kernel / uv)
      # are excluded — on a CI runner they fill the disk and take ~90 min.
      # COVERAGE_PROCESS_START + PYTHONPATH let sitecustomize start coverage in
      # each xdist worker subprocess; `coverage combine` merges them. The
      # authoritative 100% gate is the FULL local suite (see CLAUDE.md); CI's
      # coverage is the lower unit-only number and is per-shard PARTIAL here —
      # uploaded to Codecov under one flag, which merges the shards. NOT gated.
      - name: Tests + coverage (unit only, parallel)
        env:
          COVERAGE_PROCESS_START: pyproject.toml
          PYTHONPATH: .
        run: |
          # A shard either names explicit paths, or round-robin-slices a heavy
          # dir's SORTED test files across N runners (this slice = file position
          # % N). Every file lands in exactly one slice, so a newly added file is
          # auto-distributed and never dropped.
          if [ -n "${{ matrix.split_dir }}" ]; then
            target=$(ls ${{ matrix.split_dir }}/test_*.py | sort | awk "NR % ${{ matrix.split_total }} == ${{ matrix.split_index }}")
          else
            target="${{ matrix.paths }}"
          fi
          uv run pytest -m "not integration" -n auto $target
          uv run coverage combine
          uv run coverage report
          uv run coverage xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          # Codecov never blocks the build; the authoritative 100% gate is the
          # full local suite (CLAUDE.md), not CI.
          fail_ci_if_error: false

  sandbox-host-test:
    # The sandbox host is a fully independent project (own pyproject + uv.lock,
    # no workspace-app deps) — #251. It gets its own lean CI: lint + type + unit
    # tests. Integration tests (real subprocess / root / cgroup v2) are excluded
    # here, same as the backend job; the 100% gate is the full local suite.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandbox-host
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check src tests

      - name: Tests (unit only)
        run: |
          uv run coverage run -m pytest -m "not integration"
          uv run coverage report

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Tests + coverage
        run: pnpm exec vitest run --coverage

      - name: Build
        run: pnpm run build

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # `uses:` actions run at repo root regardless of job working-directory.
          files: web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
