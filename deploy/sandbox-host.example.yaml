# Example deployment of the standalone HTTP sandbox host (#60, #251).
#
# The host is now its OWN service/image (`sandbox-host/`, built from
# `sandbox-host/Dockerfile`) — it shares no code or deps with the app. It runs
# `python -m sandbox_host` in its own Deployment + HPA, configured entirely via
# `SANDBOX_HOST_*` env vars (no shared config file), and the app talks to it over
# the in-cluster ClusterIP Service (set `sandbox.kind: http` + `sandbox.http.base_url:
# http://sandbox-host:8000` in the app's config). Each sandbox runs as a pooled
# numeric uid under a per-handle cgroup v2 — so the pod needs root + a delegated
# cgroup subtree (see the securityContext notes). Adjust names/namespace/limits.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-host
  labels: { app: sandbox-host }
spec:
  replicas: 2
  selector:
    matchLabels: { app: sandbox-host }
  template:
    metadata:
      labels: { app: sandbox-host }
    spec:
      # SIGTERM → drain grace: the PreStop hook flips the host to draining
      # (POST /drain → new `create`s get 503) before termination, so a
      # scale-down doesn't strand fresh sandboxes. Keep this ≥ drain window.
      terminationGracePeriodSeconds: 60
      containers:
        - name: sandbox-host
          image: sandbox-host:latest # built from sandbox-host/Dockerfile
          command: ["python", "-m", "sandbox_host"]
          ports:
            - containerPort: 8000
          env:
            # The pod's routable IP — the host advertises this in `create` so
            # clients route every later call straight back to THIS pod.
            - name: POD_IP
              valueFrom:
                fieldRef: { fieldPath: status.podIP }
            # Standalone host config — all SANDBOX_HOST_* (see SandboxHostSettings).
            # The image bakes the agent's prebuilt tools at /opt/tools and points
            # here by default; override only to relocate or to disable tools.
            - { name: SANDBOX_HOST_TOOLS_DIR, value: "/opt/tools" }
            - { name: SANDBOX_HOST_UID_MIN, value: "100000" }
            - { name: SANDBOX_HOST_UID_MAX, value: "199999" }
            - { name: SANDBOX_HOST_MEMORY_MAX, value: "512M" }
            - { name: SANDBOX_HOST_CPU_CORES, value: "1.0" }
            - { name: SANDBOX_HOST_PIDS_MAX, value: "512" }
            # cgroup_root unset ⇒ the host auto-detects this pod's own delegated
            # cgroup v2 subtree.
            #
            # #493 exec/log timeouts — THE HOST ONLY READS THESE ENV VARS. The
            # app's config.yaml `sandbox_host:`/`sandbox:` sections do NOT reach
            # here (the host is a separate service/image, #251), so a long agent
            # command is killed at the DEFAULT 60s unless you set these. Set them
            # here, on the HOST pod, and rollout — editing config.yaml has no
            # effect on the http backend.
            #   exec_timeout = TOTAL wall-clock cap per command (0 = no cap)
            #   log_timeout  = IDLE cap: kill if no output for this long (0 = off)
            - { name: SANDBOX_HOST_EXEC_TIMEOUT, value: "3600" }
            - { name: SANDBOX_HOST_LOG_TIMEOUT, value: "1500" }
            # #493 idle_ttl reaps sandboxes orphaned by an app-pod CRASH — it is a
            # backstop, so keep it LONGER than the app's own idle_timeout (8h),
            # else this reaps still-live sessions out from under the app and the
            # user's next question waits on a full restore (0 = off).
            - { name: SANDBOX_HOST_IDLE_TTL, value: "36000" }
            # #492 durable NFS archive root — a per-item rsync target on the
            # ReadWriteMany NFS PVC mounted below. Set ⇒ the host restores a
            # sandbox's working dir from `{nfs_root}/{item}` on cold create and
            # persists it back via rsync (host-local, so no app↔host network in
            # the bulk path). Unset ⇒ no archive (transitional / local-dev).
            - { name: SANDBOX_HOST_NFS_ROOT, value: "/mnt/workspaces" }
          volumeMounts:
            # #492 the durable archive lives on a shared RWX (NFS) volume. It is
            # the ARCHIVE, written by this root process via rsync WITHOUT
            # preserving ownership (root_squash-safe) — NOT the per-uid live
            # sandbox dir (that stays on the pod's ephemeral disk under
            # SANDBOX_HOST_ROOT), so isolation is unaffected.
            - { name: workspaces, mountPath: /mnt/workspaces }
          securityContext:
            # The host must setuid/chown to foreign uids and write the cgroup
            # subtree, so it runs as root. Per-sandbox isolation is uid + cgroup
            # (NOT a privileged container) — but cgroup v2 delegation to the pod
            # is runtime-specific; on some clusters it needs a delegated subtree
            # (systemd `Delegate=yes`) or, as a coarser fallback, privileged.
            runAsUser: 0
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "curl -fsS -XPOST localhost:8000/drain; sleep 10"]
          readinessProbe: # gates `create` traffic on cgroup v2 + delegation
            httpGet: { path: /readyz, port: 8000 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 15
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }
      volumes:
        # #492 the durable workspace archive — a ReadWriteMany (NFS) claim so
        # every host replica writes its own items' subdirs. The SAME claim is
        # mounted read-write on the app pods (for cold reads + user uploads);
        # both agree on the `{nfs_root}/{item}/{path}` layout. Provision an
        # NFS-backed PVC (`accessModes: [ReadWriteMany]`) named `workspaces`.
        - name: workspaces
          persistentVolumeClaim:
            claimName: workspaces
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-host
spec:
  selector: { app: sandbox-host }
  ports:
    - port: 8000
      targetPort: 8000
  # ClusterIP: `create` load-balances here; subsequent calls go pod-direct via
  # the POD_IP the handle encodes (pod IPs are routable in-cluster).
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sandbox-host
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sandbox-host
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
# No app-level auth (v1): the host trusts in-namespace callers, so restrict who
# can reach it to the app pods only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-host-allow-app
spec:
  podSelector:
    matchLabels: { app: sandbox-host }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: workspace-app } # the app pods
      ports:
        - protocol: TCP
          port: 8000
